name: Build VSTea Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            TARGET: windows
            CMD_BUILD: pyinstaller --noconsole --onefile --name VSTea --icon assets/icon.ico --add-data "assets;assets" --add-data "gui/themes;gui/themes" --add-data "exporters/templates;exporters/templates" main.py
            OUT_PATH: dist/VSTea.exe

          - os: macos-latest
            TARGET: macos
            CMD_BUILD: pyinstaller --windowed --noconfirm --name VSTea --icon assets/icon.icns --add-data "assets:assets" --add-data "gui/themes:gui/themes" --add-data "exporters/templates:exporters/templates" main.py
            OUT_PATH: dist/VSTea.app

          - os: ubuntu-latest
            TARGET: linux
            CMD_BUILD: pyinstaller --noconsole --onefile --name VSTea --icon assets/icon.png --add-data "assets:assets" --add-data "gui/themes:gui/themes" --add-data "exporters/templates:exporters/templates" main.py
            OUT_PATH: dist/VSTea

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install Linux Dependencies (Qt/PySide6 requirements)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xfixes0 libgl1

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: ${{ matrix.CMD_BUILD }}

    - name: Zip macOS App
      if: matrix.os == 'macos-latest'
      run: |
        cd dist
        zip -r ../VSTea-macOS.zip VSTea.app

    - name: Upload Artifacts to Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/VSTea.exe
          VSTea-macOS.zip
          dist/VSTea
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}