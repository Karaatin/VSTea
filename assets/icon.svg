<svg xmlns="http://www.w3.org/2000/svg" viewBox="90 10 420 580" width="100%" height="100%">
  <defs>
    <linearGradient id="mugGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#343a4f" />
      <stop offset="100%" stop-color="#1d212f" />
    </linearGradient>
    <linearGradient id="teaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9a44" />
      <stop offset="100%" stop-color="#fc6076" />
    </linearGradient>
    <linearGradient id="wave1Grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00E5FF" stop-opacity="1"/>
      <stop offset="80%" stop-color="#FF007A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF007A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave2Grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF007A" stop-opacity="0"/>
      <stop offset="20%" stop-color="#FF007A" stop-opacity="1"/>
      <stop offset="80%" stop-color="#FFB300" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="knobGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2f42" />
      <stop offset="100%" stop-color="#14161e" />
    </linearGradient>
    
    <linearGradient id="submergedStringGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a1c0d" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8b92a5" stop-opacity="0.6"/>
    </linearGradient>

    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="submergeBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" />
    </filter>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    
    <path id="motionPathLeft" d="M 280 240 Q 250 180, 270 120 Q 290 60, 260 20" fill="none"/>
    <path id="motionPathCenter" d="M 300 240 Q 320 180, 300 120 Q 280 60, 300 20" fill="none"/>
    <path id="motionPathRight" d="M 320 240 Q 350 180, 330 120 Q 310 60, 340 20" fill="none"/>
  </defs>

  <ellipse cx="300" cy="420" rx="140" ry="25" fill="#090a0e" filter="url(#dropShadow)" />
  <ellipse cx="300" cy="420" rx="100" ry="15" fill="#14161e" />

  <g filter="url(#dropShadow)">
    <path d="M 380 260 C 480 260, 480 370, 370 380" fill="none" stroke="url(#mugGrad)" stroke-width="22" stroke-linecap="round" />
    <path d="M 210 240 L 390 240 L 390 350 C 390 410, 350 420, 300 420 C 250 420, 210 410, 210 350 Z" fill="url(#mugGrad)" />
  </g>

  <g>
    <g filter="url(#glow)">
        <circle cx="300" cy="272" r="4" fill="#00C3FF" transform="rotate(-135 300 335)"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" delay="0s"/></circle>
        <circle cx="300" cy="272" r="4" fill="#00E5FF" transform="rotate(-105 300 335)"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" delay="0.2s"/></circle>
        <circle cx="300" cy="272" r="4" fill="#00FF9D" transform="rotate(-75 300 335)"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" delay="0.4s"/></circle>
        <circle cx="300" cy="272" r="4" fill="#00FF00" transform="rotate(-45 300 335)"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" delay="0.6s"/></circle>
        <circle cx="300" cy="272" r="4" fill="#CCFF00" transform="rotate(-15 300 335)"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" delay="0.8s"/></circle>
        <circle cx="300" cy="272" r="4" fill="#FFD500" transform="rotate(15 300 335)"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" delay="1s"/></circle>
        <circle cx="300" cy="272" r="4" fill="#FF8000" transform="rotate(45 300 335)"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" delay="1.2s"/></circle>
        <circle cx="300" cy="272" r="4" fill="#FF3D00" transform="rotate(75 300 335)"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" delay="1.4s"/></circle>
        <circle cx="300" cy="272" r="4" fill="#FF007A" transform="rotate(105 300 335)"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" delay="1.6s"/></circle>
        <circle cx="300" cy="272" r="4" fill="#D400FF" transform="rotate(135 300 335)"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" delay="1.8s"/></circle>
    </g>

    <circle cx="300" cy="335" r="46" fill="none" stroke="#12141c" stroke-width="6" />
    <circle cx="300" cy="335" r="39" fill="url(#knobGrad)" filter="url(#dropShadow)" />
    <circle cx="300" cy="335" r="16" fill="#12141c" />
    
    <g transform="rotate(-45 300 335)">
        <line x1="300" y1="335" x2="300" y2="303" stroke="#00E5FF" stroke-width="8" stroke-linecap="round" opacity="0.4" filter="url(#glow)" />
        <line x1="300" y1="335" x2="300" y2="303" stroke="#00E5FF" stroke-width="4" stroke-linecap="round" />
        <circle cx="300" cy="335" r="5" fill="#00E5FF" filter="url(#glow)"/>
    </g>
  </g>

  <ellipse cx="300" cy="240" rx="90" ry="22" fill="#1d212f" />
  
  <ellipse cx="300" cy="240" rx="78" ry="16" fill="url(#teaGrad)" />
  
  <path d="M 320 254 Q 345 252, 363 246" fill="none" stroke="url(#submergedStringGrad)" stroke-width="2" stroke-linecap="round" />

  <ellipse cx="300" cy="240" rx="60" ry="10" fill="#ffffff" fill-opacity="0.15">
    <animate attributeName="cx" values="290;310;290" dur="5s" repeatCount="indefinite" ease-in-out="true"/>
    <animate attributeName="rx" values="60;65;60" dur="4s" repeatCount="indefinite" ease-in-out="true"/>
  </ellipse>

  <path d="M 363 246 Q 375 242, 388 242" fill="none" stroke="#8b92a5" stroke-width="1.5" stroke-dasharray="3 3" />

  <g filter="url(#glow)">
    <path d="M 290 240 C 260 180, 320 120, 290 50" fill="none" stroke="url(#wave1Grad)" stroke-width="6" stroke-linecap="round" stroke-dasharray="20, 10">
       <animate attributeName="stroke-dashoffset" from="0" to="30" dur="1.5s" repeatCount="indefinite" />
    </path>
    <path d="M 310 240 C 340 180, 280 120, 310 50" fill="none" stroke="url(#wave2Grad)" stroke-width="6" stroke-linecap="round" stroke-dasharray="20, 10" opacity="0.8">
       <animate attributeName="stroke-dashoffset" from="0" to="30" dur="2s" repeatCount="indefinite" />
    </path>
  </g>

  <g transform-origin="388 242">
    <animateTransform attributeName="transform" type="rotate" values="2; -2; 2" dur="6s" repeatCount="indefinite" ease-in-out="true"/>
    <path d="M 388 242 C 400 280, 385 320, 390 350" fill="none" stroke="#8b92a5" stroke-width="1.5" stroke-dasharray="3 3" />
    <g filter="url(#dropShadow)">
        <rect x="370" y="350" width="40" height="55" rx="4" fill="#FF3D00" transform="rotate(-5 390 350)"/>
        <circle cx="390" cy="360" r="3" fill="#0a0b0f" transform="rotate(-5 390 350)"/>
        <text x="390" y="388" font-family="sans-serif" font-size="14" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1" transform="rotate(-5 390 350)">VST</text>
    </g>
  </g>

  <g text-anchor="middle" filter="url(#dropShadow)">
    <text x="300" y="520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="56" font-weight="900" fill="#ffffff" letter-spacing="0">VST<tspan fill="#ff9a44" dx="-2">ea</tspan></text>
    <text x="300" y="555" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#8b92a5" letter-spacing="0.5">Your plugin inventory, freshly brewed.</text>
  </g>
</svg>